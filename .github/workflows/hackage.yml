name: Hackage release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: hackage-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/haskell.yml
  package:
    uses: ./.github/workflows/package.yml
  candidate:
    name: hackage candidate
    needs: [build, package]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v8
        with:
          name: natskell-sdist
          path: dist
      - uses: actions/download-artifact@v8
        with:
          name: natskell-hackage-docs
          path: dist-docs
      - name: Upload Hackage candidate
        env:
          HACKAGE_TOKEN: ${{ secrets.HACKAGE_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "${HACKAGE_TOKEN:-}" ]; then
            echo "HACKAGE_TOKEN is not configured"
            exit 1
          fi

          version="$(awk '/^version:/ { print $2; exit }' natskell.cabal)"
          if [ -z "${version}" ]; then
            echo "Could not read package version from natskell.cabal"
            exit 1
          fi

          tag_version="${TAG_NAME#v}"
          if [ "${tag_version}" != "${version}" ]; then
            echo "Tag ${TAG_NAME} does not match natskell.cabal version ${version}"
            exit 1
          fi

          tarball="dist/natskell-${version}.tar.gz"
          if [ ! -f "${tarball}" ]; then
            echo "Expected source distribution not found: ${tarball}"
            find dist -maxdepth 2 -type f -print
            exit 1
          fi

          docs_tarball="dist-docs/natskell-${version}-docs.tar.gz"
          if [ ! -f "${docs_tarball}" ]; then
            echo "Expected Hackage documentation tarball not found: ${docs_tarball}"
            find dist-docs -maxdepth 2 -type f -print
            exit 1
          fi

          published_url="https://hackage.haskell.org/package/natskell-${version}/natskell.cabal"
          if curl --silent --head --fail "${published_url}" >/dev/null; then
            echo "natskell-${version} is already published on Hackage; skipping candidate upload"
            exit 0
          fi

          nix develop --command cabal upload --token="${HACKAGE_TOKEN}" "${tarball}"
          nix develop --command cabal upload --documentation --token="${HACKAGE_TOKEN}" "${docs_tarball}"
  publish:
    name: hackage publish
    needs: [candidate]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v8
        with:
          name: natskell-sdist
          path: dist
      - uses: actions/download-artifact@v8
        with:
          name: natskell-hackage-docs
          path: dist-docs
      - name: Publish to Hackage
        env:
          HACKAGE_TOKEN: ${{ secrets.HACKAGE_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "${HACKAGE_TOKEN:-}" ]; then
            echo "HACKAGE_TOKEN is not configured"
            exit 1
          fi

          version="$(awk '/^version:/ { print $2; exit }' natskell.cabal)"
          if [ -z "${version}" ]; then
            echo "Could not read package version from natskell.cabal"
            exit 1
          fi

          tag_version="${TAG_NAME#v}"
          if [ "${tag_version}" != "${version}" ]; then
            echo "Tag ${TAG_NAME} does not match natskell.cabal version ${version}"
            exit 1
          fi

          tarball="dist/natskell-${version}.tar.gz"
          if [ ! -f "${tarball}" ]; then
            echo "Expected source distribution not found: ${tarball}"
            find dist -maxdepth 2 -type f -print
            exit 1
          fi

          docs_tarball="dist-docs/natskell-${version}-docs.tar.gz"
          if [ ! -f "${docs_tarball}" ]; then
            echo "Expected Hackage documentation tarball not found: ${docs_tarball}"
            find dist-docs -maxdepth 2 -type f -print
            exit 1
          fi

          published_url="https://hackage.haskell.org/package/natskell-${version}/natskell.cabal"
          if curl --silent --head --fail "${published_url}" >/dev/null; then
            echo "natskell-${version} is already published on Hackage; skipping source publish"
          else
            nix develop --command cabal upload --publish --token="${HACKAGE_TOKEN}" "${tarball}"
          fi

          docs_url="https://hackage.haskell.org/package/natskell-${version}/docs/doc-index.html"
          if curl --silent --head --fail "${docs_url}" >/dev/null; then
            echo "natskell-${version} documentation is already published on Hackage; skipping documentation publish"
          else
            nix develop --command cabal upload --documentation --publish --token="${HACKAGE_TOKEN}" "${docs_tarball}"
          fi
